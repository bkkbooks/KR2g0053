body:
  text: 征南録傳記類四雜録之屬提要臣等謹案征南録一卷宋滕甫撰甫初字元發以避髙魯王諱改字為名而字達道東陽人舉進士厯官龍圖閣學士諡章敏事蹟具宋史本傳此本前原有結銜一行題承奉郎守大理評事通判湖州軍州事滕甫蓋其時尚未改名也其書乃記皇祐四年孫沔平儂智髙事其時沔為安撫狄青為宣撫使沔與青會兵計議進破智髙於歸仁舖沔留治後事及師還余靖勒銘長沙専美狄青朝廷亦以青為樞密使賞賚甚厚沔止加秩一等甫以為南征之事本出沔議其措置先備又能以身下狄青卒攘寇難因述為此書以頌沔之績盖沔知杭州時常奇甫才授以治劇守邊方略具有知己之分故力為之表暴如此考宋史載征儂智髙事亦於狄青傳為詳而沔傳頗略然宋史藝文志馬氏經籍考並載有此書知當時皆不以為誣是亦考史者所宜參證也乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書征南録宋滕甫撰皇祐四年夏四月廣源州蠻儂智髙宼邕州守臣陳鞏死之遂擊破横貴龔潯藤梧封康瑞九州五月進圍廣州城纔容府寺倉廪而城下之民剽殺畧盡朝廷始命起居舍人楊畋閤門副使曹修安撫嶺外團練使張忠蔣偕鈐轄兩部兵馬以南征越秋七月樞宻直學士孫公自徐州徙帥秦請覲京師八月庚辰告辭将西矣上曰吾始意召卿将賴以平嶺賊今其㣲矣時廣東使者鮑軻奏於朝上信其然公對曰是非告陛下以實者臣竊聞賊破邕至廣廣天下寳貨之儲而蕃舶之家常以億萬計賊悉取之日據劉王山縱酒大會亡命歸之者萬餘人而官軍未嘗勝是豈衰息耶上驚其語注目謂之曰昔黄巢以二千人過嶺莫能制之者公曰明朝雖非唐季之比過慮庸何傷是日公出宿國門外遂行翌日聞張忠蒋偕軍相次敗于白田忠死之偕僅以身免楊畋尋亦乞棄英州壬午有詔止公毋行日中堂劄留議事越五日戊子復令陛見上諭執政曰南賊果如孫某料二府由此慊公明日詔除公江南西路荆湖南路安撫使又明日入對上曰南賊如此欲遣冨弼弼母老度必辭汝為朕行令石全斌副汝公曰臣禄於從官之列素雖有疾惡敢辭然賊勢盛須有将佐士馬甲鎧金穀之資茍闕焉亦諸将之今日也今未敢承命俟有奏論又明日陛對願得宣撫使可以集事以為其貳執政疾其言公曰茍不如請願朝廷應副軍須使無後顧之患詰難更数端不得請公曰無素具而當盛賊勢必敗事徒受責何益宰相陳執中曰敗事豈止於責邪又曰宻學無張皇公對曰是欲示鎮靜耶有備固當爾無備而示鎮靜此危亡之本也國家生靈可同戲乎又明日乞兵萬人馬千騎金帛稱之禆校八人掌機要文籍者四人軍前備指顧者二十人難者曰南方非用馬之地何以馬為公曰賊去朝廷逺茍當用馬豈朝奏而暮得耶然終以馬勝又乞兼安撫江南東荆湖北兩路冀以四路共贍軍盖向之兩路貧部也復為大臣所沮越二日詔促行纔得人馬軍七百人文臣四人備指顧者十人安撫池江饒太平四州及辭對上曰臣之所乞舉不從臣雖欲盡愚報陛下勢不能死固不足惜惜羞國爾至如乞宣撫使事盖舊例兩府大臣為之凡有須於郡國無逺近皆給之今臣所能令者兩路及四窮州而已非所部誰應軍須者上曰卿第行事且急為卿出宣撫使公再拜曰審如徳音平南必矣上喜曰卿先到彼但多為備公復對曰臣不知大臣何以見沮止如楊畋􅃽偕輩行無所請亦無功效今臣與石全斌單行儻茍避賊其敢虚死以憂朝廷萬一賊平臣止求致仕至遣宣撫一司須頼聖明獨斷公求致仕之言盖嘗有譖其張皇賊勢事成而邀賞者故以言將行慮賊入湖南於是先為虚聲飛報荆湖南北曰大兵即至促多建營壘及将佐數十宇盛儲賞犒之備傳之諸郡於是人心稍定賊以故不敢過嶺既行之後蒋偕又陷賊於賀州九月甲辰公行至鼎州加安撫廣南東西路又以樞宻副使狄青為宣撫使公遂留長沙一月以待且思所以制勝之具朝夕不怠公疾且病矣大臣疑其不肯行上遣御醫周應與中貴人來過嶺視疾因道上語曰大臣不為孫某地朕須應副令了南事有禆将晋人李定者父子兄弟凡七人閑戰鬭公遣先之桂象間逆朝廷所遣兵次于賓州慮其為人所使貪功敗事令之曰妄出戰吾斬汝一家後桂帥果使之定不聼屯賓之如和闗外賊至不與戰遂引去及使他兵果敗乃陳崇義軍也賓象由是而完公之計也十有一月集軍費得錢帛百萬矣又聞賊之長技用蠻牌捻鎗每人持牌以蔽身二人持鎗夾牌以殺人衆進如堵弓矢莫能加久為南患公乃多備長刀大斧制其所長南方水潦不時而瘴癘将作燥濕之具百計悉備備成而狄至過嶺而南時十有二月也狄與公議事公以三䇿料曰賊出上計歸其巢穴中計守邕城自固以久王師下計與吾戰今度其必出下計焉何者彼以天幸横行大嶺之外有驕我心驕則必出出則必敗使吾二人者心和而謀協狂㓂奚容不誅某請遇事宻輸計於太尉太尉自行之軍中無二令自取美名非我意也狄大喜出其非望公以身下之後有處置狄常令軍中曰此事是孫宻學擘畫及歸朝亦數以告上二公之心人以為難明年正月逹賓象間大軍及輜重凡四萬人出崑崙闗行三日部曲前後不相屬宿朝天驛公乃謂狄曰兵行如此卒遇賊何以支是夕申命諸校各有隊伍明日果遇賊於歸仁舖賊在山後偏将孫節祝貴陣於前石全斌為左翼劉几為右翼狄與公暨桂帥余靖處中軍李定殿其後賊将戰余懼棄所部入公軍公叱去之象衆據山而陣孫節恃勇出與之爭地形公疾呼節曰此豈爭地利處耶節不聼兵小衂死焉狄素竒之失聲驚呼節之餘軍與祝貴軍復振遂用公之刀斧斫牌鎗響震山谷先所命三百騎為竒兵出山背突賊後潰前軍乗之殺傷數千人賊遂遁保邕城公欲圍城以取之狄不許是夜官軍乃寨于山前公曰軍中必由一二人怯於戰者虚聲相連乃下令軍中敢夜有呼叫者斬漏二鼓他寨果驚呼賊聞以為大軍至遂空壁而去獨公所部無一人動者明日兵進邕州狄嫌以恩悦軍不即賞衆皆忷忷或偶語者公乃與狄議曰士卒冐萬里險瘴以立功柰何不賞耶萬一有變非太尉計狄於是取下賞賞之衆遂定已而治附賊者公乃白太尉曰其脅從者其可盡誅耶當先為公詰其端送至廷下者乃可殺太尉曰諾由公所全活者盖數十百千人狄先還京師公留邕計事以舊戍兵三嵗一易瘴死者十常七八乃令本道擇善地畨休留邕者止一嵗故人人樂戍郡城惟三門公新作北門號曰歸仁門使向闕示其有歸懐之意及闢土乃得舊址衆服公識又表洪潭籍重兵多畜財以給嶺外築城撫集亡民散卒置博易務通諸蠻之有無民之因賊而科徭賣鬻男女為人奴婢者約以一年折其劵及狄至自南還樞府厚賞金寳官其數子賜第一區而公止與余靖加秩一等公以嘗乞身歸田野大臣尤公之慙其前害其寵名上曰孫某求致仕矣執政愕然無以對公尋累乞杭行至南都上曰豈朕指耶詔擢為樞宻副使懇避再三不獲已而受命焉及領機務昻然有古名臣之風其事非此所得書也初儂氏世為廣源大酋智髙父嘗㓂交阯獲焉智髙釋父怨因結懽好異時交阯使之守廣源又以桀黠為姦交阯敗走之後據有田州以其守黄光祚之母為妻佯交特摩國以母嫁其國主既又并其土衆始乞本朝補田州刺史不得又乞教練使又乞特賜袍笏又乞每南郊時貢金千兩願常於邕管互市皆不許至令入㓂及其敗竄久之至大理國斬首以獻前二公破走智髙時令邕守蕭注捕之後得其母與弟戮于都市予嘗謂近世文臣罕有躬戰伐成功名者獨公善為兵又能身下狄以攘㓂難固已鮮哉因録以示後世云征南録
